name: flutter_mapbox_navigation
description: >
  Add Turn By Turn Navigation to Your Flutter Application Using MapBox. 
  Never leave your app when you need to navigate your users to a location.
version: 0.2.2
publish_to: 'none'

environment:
  sdk: '>=2.19.4 <4.0.0'
  flutter: ">=2.5.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

